name: CI
# Event设置为main分支的pull request事件，
# 这里的main分支相当于master分支，github项目新建是把main设置为默认分支，我懒得改了所以就保持这样吧
on:
  pull_request:
    branches: main

# 定义环境变量，便于管理
env:
  NODE_VERSION: '22.x'
jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      # 拉取项目代码
      - name: Checkout repository
        uses: actions/checkout@v2
      # 给当前环境下载node
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
      # 检查缓存
      # 如果key命中缓存则直接将缓存的文件还原到 path 目录，从而减少流水线运行时间
      # 若 key 没命中缓存时，在当前Job成功完成时将自动创建一个新缓存
      - name: Cache
        # 缓存命中结果会存储在steps.[id].outputs.cache-hit里，该变量在继后的step中可读
        id: cache-dependencies
        uses: actions/cache@v3
        with:
          # 缓存文件目录的路径
          path: |
            **/node_modules
          # key中定义缓存标志位的生成方式。runner.OS指当前环境的系统。外加对yarn.lock内容生成哈希码作为key值，如果yarn.lock改变则代表依赖有变化。
          # 这里用yarn.lock而不是package.json是因为package.json中还有version和description之类的描述项目但和依赖无关的属性
          key: ${{runner.OS}}-${{hashFiles('**/yarn.lock')}}
      - name: Install dependencies
        # 如果缓存标志位没命中，则执行该step。否则就跳过该step
        if: steps.cache-dependencies.outputs.cache-hit != 'true'
        run: yarn install
      # 运行代码扫描
      - name: Running Lint
        # 通过前面章节定义的命令行执行代码扫描
        run: yarn lint

      # 构建项目
      - name: Build project
        run: yarn build

      # 通过SSH部署到服务器
      - name: Deploy to nginx server
        uses: appleboy/scp-action@v0.1.4
        with:
          # host: ${{ secrets.SERVER_IP }}
          # username: ${{ secrets.SERVER_USERNAME }}
          # key: ${{ secrets.SSH_PRIVATE_KEY }}
          host: 111.229.175.151
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          # 重要：source 是构建后的目录，这里假设是 'dist'
          source: 'dist/*'
          target: '/nginx/html' # 你的 Nginx 网站根目录
          strip_components: 1 # 移除路径中的 'dist/' 部分
